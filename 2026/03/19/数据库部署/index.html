              <div class="markdown-body">
                
                <h1 id="数据库-安装-部署-登录-密码"><a href="#数据库-安装-部署-登录-密码" class="headerlink" title="数据库-安装-部署-登录-密码"></a>数据库-安装-部署-登录-密码</h1><h3 id="数据库安装方式"><a href="#数据库安装方式" class="headerlink" title="数据库安装方式"></a>数据库安装方式</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><code class="hljs bash">安装方式一：yum/apt-get 	可以解决软件依赖关系（配置好下载源）<br>安装方式二：rpm包安装      需要提前在软件包，离线安装软件<br>安装方式三：源码编译安装	可以定制化安装软件，离线安装软件<br>安装方式四：二进制包安装  	可以快速部署数据库,	离线安装软件<br></code></pre></td></tr></table></figure>

<h3 id="安装8-0系列的长期支持版"><a href="#安装8-0系列的长期支持版" class="headerlink" title="安装8.0系列的长期支持版"></a>安装8.0系列的长期支持版</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment">#一:官网下载二进制软件包</span><br>https://www.mysql.com/cn/downloads/<br><span class="hljs-comment">#二:系统环境基础配置</span><br>1.确认系统是否可以连网/可以远程控制<br>ping www.baidu.com <br>2.安装mysql依赖软件<br>apt-get install -y libaio-dev libncurses-dev numactl net-tools libssl-dev libtinfo5<br>3.创建服务用户与存储数据目录<br>useradd mysql -M -s /sbin/nologin <br><span class="hljs-built_in">mkdir</span> -p /data/3306/data &amp;&amp; <span class="hljs-built_in">chown</span> mysql.mysql /data/3306/data <br><span class="hljs-comment">#三:解压安装数据库程序</span><br>--------------------<br><span class="hljs-built_in">cd</span> /usr/local/<br>--------------------<br>tar xvf mysql-8.0.32-linux-glibc2.12-x86_64.tar.xz<br>--------------------<br><span class="hljs-comment">#创建软连接，更方便</span><br><span class="hljs-built_in">ln</span> -s mysql-8.0.32-linux-glibc2.12-x86_64 mysql    --重要目录bin，存放数据库的命令信息（mysql mysqladmin mysqldump ...)<br>--------------------<br><span class="hljs-comment">#配置信息</span><br>vim ~/.bashrc <br><span class="hljs-built_in">export</span> PATH=<span class="hljs-string">&quot;<span class="hljs-variable">$PATH</span>:/usr/local/mysql/bin&quot;</span><br>--------------------<br><span class="hljs-comment">#source一下</span><br><span class="hljs-built_in">source</span> ~/.bashrc<br>--------------------<br><span class="hljs-comment">#查看mysql版本</span><br>mysql -v<br>--------------------<br><span class="hljs-comment">#四:编写数据库服务配置文件</span><br><span class="hljs-built_in">cat</span> &gt; /etc/my.cnf &lt;&lt;<span class="hljs-string">eof</span><br><span class="hljs-string">[mysql]</span><br><span class="hljs-string">socket=/tmp/mysql.sock</span><br><span class="hljs-string">[mysqld]</span><br><span class="hljs-string">user=mysql</span><br><span class="hljs-string">basedir=/usr/local/mysql</span><br><span class="hljs-string">datadir=/data/3306/data</span><br><span class="hljs-string">socket=/tmp/mysql.sock</span><br><span class="hljs-string">eof</span><br>--------------------<br><span class="hljs-comment">#步骤五：数据库服务初始化操作</span><br>mysqld --initialize-insecure  --user=mysql  --datadir=/data/3306/data  --basedir=/usr/local/mysql <br>-- 进行不安全初始化，不会创建root用户临时密码（root用户可以免密登录）<br>2024-10-08T03:56:46.159721Z 0 [System] [MY-013169] [Server] /usr/local/mysql-8.0.32-linux-glibc2.12-x86_64/bin/mysqld (mysqld 8.0.32) initializing of server <span class="hljs-keyword">in</span> progress as process 2090<br>2024-10-08T03:56:46.184294Z 1 [System] [MY-013576] [InnoDB] InnoDB initialization has started.<br>2024-10-08T03:56:47.034991Z 1 [System] [MY-013577] [InnoDB] InnoDB initialization has ended.<br>2024-10-08T03:56:48.696529Z 6 [Warning] [MY-010453] [Server] root@localhost is created with an empty password ! Please consider switching off the --initialize-insecure option.<br>-- 没有看到初始化中的错误或失败信息，表示初始化成功（不安全）<br></code></pre></td></tr></table></figure>

<h3 id="启动mysql管理"><a href="#启动mysql管理" class="headerlink" title="启动mysql管理"></a>启动mysql管理</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment">#方法一 mysql自带的脚本启动</span><br>--------------------  <span class="hljs-comment">#数据库日志位置</span><br>[root@db01 /usr/local/mysql/data]# <span class="hljs-built_in">ls</span>  db01.err <br>db01.err<br>[root@db01 /usr/local/mysql/data]# <span class="hljs-built_in">pwd</span><br>/usr/local/mysql/data<br>--------------------   <span class="hljs-comment">#mysql启动位置</span><br>[root@db01 /usr/local/mysql/support-files]# <span class="hljs-built_in">ls</span> mysql.server <br>mysql.server<br>[root@db01 /usr/local/mysql/support-files]# <span class="hljs-built_in">pwd</span><br>/usr/local/mysql/support-files<br>-------------------- <span class="hljs-comment">#启动</span><br>[root@db01 /usr/local]# /usr/local/mysql/support-files/mysql.server start<br>Starting MySQL<br>.Logging to <span class="hljs-string">&#x27;/data/3306/data/db01.err&#x27;</span>.<br>.. * <br>-------------------- <span class="hljs-comment">#查看mysql系统进程</span><br>[root@db-01 <span class="hljs-built_in">local</span>]# ps -ef|grep mysql<br>root       2386      1  0 15:07 pts/0    00:00:00 /bin/sh /usr/local/mysql/bin/mysqld_safe --datadir=/data/3306/data --pid-file=/data/3306/data/db-01.pid<br>                                 <span class="hljs-comment">#-- 以上进程称为数据库主进程    #-- 管理进程</span><br>mysql      2525   2386 15 15:07 pts/0    00:00:03 /usr/local/mysql/bin/mysqld --basedir=/usr/local/mysql --datadir=/data/3306/data --plugin-dir=/usr/local/mysql/lib/plugin --user=mysql --log-error=db-01.err --pid-file=/data/3306/data/db-01.pid --socket=/tmp/mysql.sock<br>-- 以上进程称为数据库子进程            -- 工作进程<br><br>-------------------- <span class="hljs-comment">#查看端口  ss -tnulp也行</span><br>[root@db-01 <span class="hljs-built_in">local</span>]# netstat -lntup|grep 3306<br>tcp6       0      0 :::3306                 :::*                    LISTEN      2525/mysqld         <br>tcp6       0      0 :::33060                :::*                    LISTEN      2525/mysqld <br>-------------------- <span class="hljs-comment">#关闭数据库</span><br>/usr/local/mysql/support-files/mysql.server stop<br></code></pre></td></tr></table></figure>

<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment">#方法二编写mysql.service文件，被systemctl命令加载（systemctl daemon-reload）</span><br><span class="hljs-built_in">cat</span> &gt; /etc/systemd/system/mysqld.service &lt;&lt;<span class="hljs-string">&#x27;EOF&#x27;</span><br>[Unit]<br>Description=MySQL Server<br>After=network.target<br><br>[Service]<br>User=mysql<br>Group=mysql<br>ExecStart=/usr/local/mysql/bin/mysqld --defaults-file=/etc/my.cnf<br>ExecStop=/usr/local/mysql/bin/mysqladmin -uroot -p<span class="hljs-string">&#x27;&#x27;</span> shutdown<br>Restart=on-failure<br>LimitNOFILE=65535<br><br>[Install]<br>WantedBy=multi-user.target<br>EOF<br>[root@db01 /usr/local]# systemctl daemon-reload<br>--------------------  <span class="hljs-comment">#测试是否成功</span><br>[root@db01 /usr/local]# systemctl start mysqld<br>[root@db01 /usr/local]# netstat -tnulp<br>Active Internet connections (only servers)<br>Proto Recv-Q Send-Q Local Address           Foreign Address         State       PID/Program name    <br>tcp        0      0 0.0.0.0:22              0.0.0.0:*               LISTEN      909/sshd: /usr/sbin <br>tcp        0      0 127.0.0.53:53           0.0.0.0:*               LISTEN      837/systemd-resolve <br>tcp6       0      0 :::22                   :::*                    LISTEN      909/sshd: /usr/sbin <br>tcp6       0      0 :::33060                :::*                    LISTEN      2323/mysqld         <br>tcp6       0      0 :::3306                 :::*                    LISTEN      2323/mysqld         <br>udp        0      0 127.0.0.53:53           0.0.0.0:*                           837/systemd-resolve <br>[root@db01 /usr/local]# systemctl status mysqld<br>● mysqld.service - MySQL Server<br>     Loaded: loaded (/etc/systemd/system/mysqld.service; disabled; vendor preset: enabled)<br>     Active: active (running) since Thu 2026-03-19 19:32:57 CST; 10s ago<br>   Main PID: 2323 (mysqld)<br>      Tasks: 39 (<span class="hljs-built_in">limit</span>: 4515)<br>     Memory: 460.4M<br>        CPU: 1.175s<br>     CGroup: /system.slice/mysqld.service<br>             └─2323 /usr/local/mysql/bin/mysqld --defaults-file=/etc/my.cnf<br><br>Mar 19 19:32:57 db01 systemd[1]: Started MySQL Server.<br>.......<br>[root@db01 /usr/local]# systemctl stop mysqld<br>[root@db01 /usr/local]# netstat -tnulp<br>Active Internet connections (only servers)<br>Proto Recv-Q Send-Q Local Address           Foreign Address         State       PID/Program name    <br>tcp        0      0 0.0.0.0:22              0.0.0.0:*               LISTEN      909/sshd: /usr/sbin <br>tcp        0      0 127.0.0.53:53           0.0.0.0:*               LISTEN      837/systemd-resolve <br>tcp6       0      0 :::22                   :::*                    LISTEN      909/sshd: /usr/sbin <br>udp        0      0 127.0.0.53:53           0.0.0.0:*                           837/systemd-resolve <br><br></code></pre></td></tr></table></figure>

<h3 id="密码"><a href="#密码" class="headerlink" title="密码"></a>密码</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><code class="hljs bash">--------------------#设置密码：(没有密码可以设置密码）<br>mysqladmin -uroot password <span class="hljs-string">&quot;你想输入的密码&quot;</span><br>mysql&gt; alter user root@<span class="hljs-string">&#x27;localhost&#x27;</span> identified by <span class="hljs-string">&#x27;123&#x27;</span>;<br>--------------------#修改密码<br>mysqladmin -uroot -p123456 password <span class="hljs-string">&quot;你想改的密码&quot;</span><br>mysql&gt; alter user root@<span class="hljs-string">&#x27;localhost&#x27;</span> identified by <span class="hljs-string">&#x27;123&#x27;</span>;<br>--------------------#如果忘记密码....<br>1.先停掉mysql<br>systemctl stop mysqld<br>pkill mysqld  <span class="hljs-comment"># 强制杀死，确保彻底停掉</span><br>2.免密登录<br>mysqld --user=mysql --skip-grant-tables --skip-networking &amp;<br>3.登录不需要密码<br>mysql -uroot<br>4.重置密码<br>FLUSH PRIVILEGES;<br>ALTER USER <span class="hljs-string">&#x27;root&#x27;</span>@<span class="hljs-string">&#x27;localhost&#x27;</span> IDENTIFIED BY <span class="hljs-string">&#x27;新密码&#x27;</span>;<br></code></pre></td></tr></table></figure>

<script>
// 软萌小巧猫咪样式（适配12px，无乱码）
const catPaws = [
  '˚‧º·(ฅωฅ)‧º·˚',
  '╭˚ʚෆɞ˚╮',
  '(๑•̀ᴗ•́)و ̑̑',
  '=^･ω･^=',
  'ฅ•ω•ฅ',
  'ヽ(=^･ω･^=)丿',
  '๑˃̵ᴗ˂̵๑'
];

// 页面加载完成后立即绑定事件（去掉多余判断）
window.onload = function() {
  // 绑定到 document 上，优先级最高，不拦截任何元素
  document.onclick = function(e) {
    // 1. 创建猫咪元素（不管点击什么，先创建特效）
    let paw = document.createElement('span');
    paw.innerText = catPaws[Math.floor(Math.random() * catPaws.length)];
    
    // 2. 核心样式（12px极致小巧）
    paw.style.position = 'fixed';
    paw.style.fontSize = '12px';
    paw.style.color = '#f997b0';
    paw.style.left = (e.clientX - 6) + 'px';
    paw.style.top = (e.clientY - 6) + 'px';
    paw.style.zIndex = '999999'; // 最高层级，不被遮挡
    paw.style.pointerEvents = 'none'; // 不影响后续点击
    paw.style.transform = 'scale(0)';
    paw.style.animation = 'paw-animation 2.5s ease-out forwards';
    
    // 3. 动画样式（2.5秒长停留）
    const style = document.createElement('style');
    style.textContent = `
      @keyframes paw-animation {
        0% { transform: scale(0) rotate(0deg); opacity: 0; }
        10% { transform: scale(1.1) rotate(6deg); opacity: 1; }
        50% { transform: scale(1.1) rotate(6deg); opacity: 1; }
        90% { transform: scale(1.2) rotate(0deg); opacity: 0.2; }
        100% { transform: scale(1.2) rotate(0deg); opacity: 0; }
      }
    `;
    document.head.appendChild(style);
    
    // 4. 添加到页面并设置自动删除
    document.body.appendChild(paw);
    setTimeout(() => paw.remove(), 2500);

    // 5. 不做任何拦截，让点击的元素正常执行默认行为（跳转/触发事件）
  };
};
</script>
