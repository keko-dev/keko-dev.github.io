                <h1 id="openstack"><a href="#openstack" class="headerlink" title="openstack"></a>openstack</h1><h2 id="介绍"><a href="#介绍" class="headerlink" title="介绍"></a>介绍</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs bash">OpenStack 是一个开源的云计算平台（IaaS，基础设施即服务），用于构建和管理私有云、公有云或混合云环境。它允许企业像使用 AWS、阿里云一样，在自己的数据中心中提供虚拟机、存储、网络等云服务。<br></code></pre></td></tr></table></figure>

<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br></pre></td><td class="code"><pre><code class="hljs bash"> 一、一句话定义<br>OpenStack = 开源版“阿里云/ AWS”<br>它把物理服务器、存储、网络设备抽象成池化资源，通过 Web 控制台或 API 按需分配给用户，实现“自助式 IT 服务”。<br>🔧 二、核心功能（你能用它做什么？）<br>功能	对应 OpenStack 				类比公有云产品<br>计算（虚拟机）	Nova			  阿里云 ECS / AWS EC2<br>网络（虚拟网络）	Neutron		 阿里云 VPC / AWS VPC<br>存储（块存储）	Cinder		      阿里云云盘 / AWS EBS<br>对象存储	Swift				阿里云 OSS / AWS S3<br>镜像管理	Glance				阿里云自定义镜像<br>身份认证	Keystone			阿里云 RAM / AWS IAM<br>Web 控制台	Horizon				 阿里云控制台<br>编排（自动化部署）	Heat	队列 ROS / AWS CloudFormation<br>✅ 你可以通过 OpenStack：<br>创建一台 Linux 虚拟机（Nova + Glance）<br>给它分配 IP 和安全组（Neutron）<br>挂载一块 100GB 硬盘（Cinder）<br>上传文件到对象存储（Swift）<br>所有操作可通过 Web 页面（Horizon）或命令行完成<br>🏗️ 三、架构特点<br>模块化设计：每个功能由独立服务（Service）提供，可按需部署；<br>API 驱动：所有操作通过 RESTful API 实现，便于自动化集成；<br>支持多虚拟化技术：KVM（最常用）、Xen、VMware、Docker（实验性）；<br>高可用 &amp; 可扩展：支持横向扩展，适合大规模部署（如电信、金融私有云）。<br>💼 四、谁在用 OpenStack？<br>表格<br>行业	典型用户	使用场景<br>电信运营商	中国移动、AT&amp;T、Verizon	构建 NFV（网络功能虚拟化）平台<br>金融/政府	中国银联、NASA（早期）	安全可控的私有云，满足等保要求<br>大型企业	华为、沃尔玛	内部 IT 资源池化，降本增效<br>云服务商	部分中小型 IDC	提供公有云服务（如 UnitedStack、EasyStack）<br>⚠️ 注意：互联网大厂（如阿里、腾讯）已逐步转向自研云平台，但 OpenStack 仍在传统行业广泛使用。<br>🆚 五、OpenStack vs Kubernetes（K8s）<br>表格<br>对比项	OpenStack	Kubernetes<br>定位	IaaS（管虚拟机/硬件）	PaaS（管容器/应用）<br>抽象层	物理机 → 虚拟机	虚拟机/物理机 → 容器 Pod<br>典型用户	运维、基础设施团队	开发、SRE、DevOps<br>学习曲线	陡峭（组件多、依赖复杂）	较陡（但生态更活跃）<br>趋势	在私有云稳定存在，增长放缓	云原生主流，爆发式增长<br>💡 现实场景：很多企业 “OpenStack + K8s” 混合使用 ——<br>OpenStack 提供虚拟机，K8s 在虚拟机上跑容器。<br></code></pre></td></tr></table></figure>

<h2 id="核心组件"><a href="#核心组件" class="headerlink" title="核心组件"></a>核心组件</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><code class="hljs bash">| 组件名 | 项目代号 | 功能说明 | 类比公有云产品 |<br>|-------|--------|--------|--------------|<br>| 1. 身份认证服务 | Keystone | 提供用户、角色、权限管理和 API 认证（所有服务都依赖它） | 阿里云 RAM / AWS IAM |<br>| 2. 计算服务 | Nova | 管理虚拟机（VM）的生命周期：创建、启动、停止、删除等 | 阿里云 ECS / AWS EC2 |<br>| 3. 镜像服务 | Glance | 存储和管理虚拟机镜像（如 CentOS.qcow2、Windows ISO） | 阿里云自定义镜像 |<br>| 4. 网络服务 | Neutron | 提供虚拟网络：子网、路由、安全组、负载均衡、IP 分配等 | 阿里云 VPC / 安全组 |<br>| 5. 块存储服务 | Cinder | 为虚拟机提供持久化块存储（类似云硬盘），支持挂载/卸载 | 阿里云云盘 / AWS EBS |<br>| 6. 对象存储服务 | Swift | 提供高可用、分布式的对象存储（存图片、视频、备份等） | 阿里云 OSS / AWS S3 |<br>| 7. Web 控制台 | Horizon | 基于 Web 的图形化管理界面，供用户和管理员操作云资源 | 阿里云控制台 |<br><br><br></code></pre></td></tr></table></figure>

<script>
// 软萌小巧猫咪样式（适配12px，无乱码）
const catPaws = [
  '˚‧º·(ฅωฅ)‧º·˚',
  '╭˚ʚෆɞ˚╮',
  '(๑•̀ᴗ•́)و ̑̑',
  '=^･ω･^=',
  'ฅ•ω•ฅ',
  'ヽ(=^･ω･^=)丿',
  '๑˃̵ᴗ˂̵๑'
];

// 页面加载完成后立即绑定事件（去掉多余判断）
window.onload = function() {
  // 绑定到 document 上，优先级最高，不拦截任何元素
  document.onclick = function(e) {
    // 1. 创建猫咪元素（不管点击什么，先创建特效）
    let paw = document.createElement('span');
    paw.innerText = catPaws[Math.floor(Math.random() * catPaws.length)];
    
    // 2. 核心样式（12px极致小巧）
    paw.style.position = 'fixed';
    paw.style.fontSize = '12px';
    paw.style.color = '#f997b0';
    paw.style.left = (e.clientX - 6) + 'px';
    paw.style.top = (e.clientY - 6) + 'px';
    paw.style.zIndex = '999999'; // 最高层级，不被遮挡
    paw.style.pointerEvents = 'none'; // 不影响后续点击
    paw.style.transform = 'scale(0)';
    paw.style.animation = 'paw-animation 2.5s ease-out forwards';
    
    // 3. 动画样式（2.5秒长停留）
    const style = document.createElement('style');
    style.textContent = `
      @keyframes paw-animation {
        0% { transform: scale(0) rotate(0deg); opacity: 0; }
        10% { transform: scale(1.1) rotate(6deg); opacity: 1; }
        50% { transform: scale(1.1) rotate(6deg); opacity: 1; }
        90% { transform: scale(1.2) rotate(0deg); opacity: 0.2; }
        100% { transform: scale(1.2) rotate(0deg); opacity: 0; }
      }
    `;
    document.head.appendChild(style);
    
    // 4. 添加到页面并设置自动删除
    document.body.appendChild(paw);
    setTimeout(() => paw.remove(), 2500);

    // 5. 不做任何拦截，让点击的元素正常执行默认行为（跳转/触发事件）
  };
};
</script>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/tocbot/4.20.1/tocbot.min.js', function() {
    var toc = jQuery('#toc');
    if (toc.length === 0 || !window.tocbot) { return; }
    var boardCtn = jQuery('#board-ctn');
    var boardTop = boardCtn.offset().top;

    window.tocbot.init(Object.assign({
      tocSelector     : '#toc-body',
      contentSelector : '.markdown-body',
      linkClass       : 'tocbot-link',
      activeLinkClass : 'tocbot-active-link',
      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc));
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
  });
</script>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/5.0.0/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
